<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
    </header>

    <main>
      <!-- Balance Display -->
      <section id="balance-display" aria-label="Total balance">
        <h2>Total Balance</h2>
        <p class="balance-amount">$0.00</p>
      </section>

      <!-- Transaction Input Form -->
      <section id="transaction-form-section" aria-label="Add transaction">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="item-name"
              placeholder="e.g. Coffee"
              autocomplete="off"
            />
            <span class="error-msg" id="item-name-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="amount">Amount</label>
            <input
              type="number"
              id="amount"
              name="amount"
              placeholder="e.g. 4.50"
              min="0.01"
              step="0.01"
            />
            <span class="error-msg" id="amount-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="category-select">Category</label>
            <select id="category-select" name="category">
              <option value="">-- Select a category --</option>
            </select>
            <span class="error-msg" id="category-error" role="alert"></span>
          </div>

          <button type="submit" class="btn btn-primary">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section id="transaction-list-section" aria-label="Transaction history">
        <h2>Transactions</h2>
        <ul id="transaction-list" aria-live="polite">
          <!-- Transactions rendered here by JS -->
        </ul>
      </section>

      <!-- Pie Chart -->
      <section id="chart-container" aria-label="Spending by category">
        <h2>Spending by Category</h2>
        <canvas id="pie-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      </section>

      <!-- Category Manager -->
      <section id="category-manager" aria-label="Manage categories">
        <h2>Categories</h2>

        <form id="add-category-form" novalidate>
          <div class="form-group">
            <label for="new-category-name">New Category Name</label>
            <input
              type="text"
              id="new-category-name"
              name="new-category-name"
              placeholder="e.g. Health"
              autocomplete="off"
            />
            <span class="error-msg" id="new-category-error" role="alert"></span>
          </div>
          <button type="submit" class="btn btn-secondary">Add Category</button>
        </form>

        <div id="category-list" aria-label="Category spending limits">
          <!-- Category rows rendered here by JS -->
        </div>
      </section>

      <!-- Monthly Summary -->
      <section id="monthly-summary" aria-label="Monthly spending summary">
        <h2>Monthly Summary</h2>

        <div class="month-selector">
          <label for="summary-month">Month</label>
          <select id="summary-month" name="summary-month">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>

          <label for="summary-year">Year</label>
          <select id="summary-year" name="summary-year">
            <!-- Years rendered here by JS -->
          </select>
        </div>

        <div id="monthly-summary-content" aria-live="polite">
          <!-- Monthly summary table rendered here by JS -->
        </div>
      </section>
    </main>

    <!-- Chart.js CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"
      onerror="(function(){var c=document.getElementById('pie-chart');if(c){var p=document.createElement('p');p.className='chart-unavailable';p.textContent='Chart unavailable \u2014 please check your internet connection.';c.parentNode.replaceChild(p,c);}})();"
    ></script>

    <!-- App -->
    <script defer src="js/app.js"></script>
  </body>
</html>
